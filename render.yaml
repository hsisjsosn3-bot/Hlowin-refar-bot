services:
  - type: web
    name: mega-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DEFAULT_REFERRAL
        sync: false
      - key: DEFAULT_PASSWORD
        sync: false
      - key: VERIFY_CODE
        sync: false
      - key: EM_CONCURRENCY
        value: 250
      - key: EM_DELAY
        value: 0.002
      - key: HOLWIN_INVITE
        sync: false
      - key: REX_INVITE
        sync: false
      - key: WB_DEFAULT_DELAY
        value: 1.0
      - key: SELENIUM_ENABLED
        value: false
      - key: TWOCAPTCHA_ENABLED
        value: false
